site_name: Factor Stat Arb
site_description: Explainable factor-residual statistical arbitrage on US equities
site_author: Nishant Nayar
site_url: https://nishantnayar.github.io/factor-stat-arb

docs_dir: docs

repo_name: nishantnayar/factor-stat-arb
repo_url: https://github.com/nishantnayar/factor-stat-arb
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Nishant Nayar

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Methodology: methodology.md
  - Project Spec: PROJECT_SPEC.md
